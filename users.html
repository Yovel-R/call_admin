<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users · Call AutoTerminate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="app-shell">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon"><i class="fa-solid fa-chart-gantt"></i></div>
                <div>
                    <div class="sidebar-logo-text">Call AutoTerminate</div>
                    <div class="sidebar-logo-sub">Admin Panel</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a class="nav-item" href="./index.html">
                    <span class="nav-icon"><i class="fa-solid fa-tachograph-digital"></i></span> Dashboard
                </a>
                <a class="nav-item active" href="./users.html">
                    <span class="nav-icon"><i class="fa-solid fa-users"></i></span> Users
                </a>
            </nav>

            <div class="sidebar-user">
                <div class="avatar" id="avatarInitial">A</div>
                <span class="sidebar-username" id="navUser">Admin</span>
                <button class="btn-icon" id="logoutBtn" title="Sign out">⎋</button>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-content">

            <!-- TOPBAR -->
            <div class="topbar">
                <h1>Users Management</h1>
                <div class="topbar-actions">
                    <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
                    <button class="btn btn-primary" id="openAddUserBtn">＋ Add User</button>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">

                <!-- USERS TABLE -->
                <div class="table-card">
                    <div class="table-header">
                        <h2>Registered App Users &nbsp;<span class="badge" id="countBadge">0</span></h2>
                    </div>
                    <div id="tableBody">
                        <div class="loader">Loading…</div>
                    </div>
                </div>

            </div><!-- /content -->
        </div><!-- /main-content -->
    </div><!-- /app-shell -->

    <!-- ADD USER MODAL -->
    <div class="modal-backdrop" id="addUserModal">
        <div class="modal">
            <h2>Add New User</h2>
            <p>Enter the service name and phone number — the password is auto-generated.</p>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="serviceName">Service Name</label>
                    <input type="text" id="serviceName" placeholder="e.g. Zomato" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g. 9876543210" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Auto-generated Password</label>
                    <input type="text" id="generatedPassword" readonly placeholder="Fill fields above…"
                        style="background:var(--accent-lt);color:var(--accent);font-weight:600;cursor:default;letter-spacing:.5px;" />
                </div>
                <div class="alert alert-error" id="modalError"></div>
                <div class="alert alert-success" id="modalSuccess"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="addUserSubmit">Create User</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./assets/js/users.js"></script>
</body>

</html>
